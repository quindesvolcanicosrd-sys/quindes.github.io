<!-- Date picker modal -->
<div id="date-picker-modal">
  <div class="dp-card">
    <div class="dp-header">
      <div class="dp-header-label">Selecciona una fecha</div>
      <div class="dp-selected-date" id="dp-selected-label">—</div>
    </div>
    <div class="dp-nav">
      <div class="dp-nav-chips">
        <span id="dp-month-label" class="dp-nav-chip">Enero</span>
        <span id="dp-year-label"  class="dp-nav-chip">2000</span>
      </div>
      <div id="dp-nav-arrows" style="display:flex;gap:4px;">
        <button class="dp-nav-btn" id="dp-prev" type="button"><span class="material-icons">chevron_left</span></button>
        <button class="dp-nav-btn" id="dp-next" type="button"><span class="material-icons">chevron_right</span></button>
      </div>
    </div>
    <div id="dp-month-grid" class="dp-month-grid" style="display:none;"></div>
    <div id="dp-grid-wrap">
      <div class="dp-grid" id="dp-day-labels">
        <div class="dp-day-label">L</div><div class="dp-day-label">M</div>
        <div class="dp-day-label">M</div><div class="dp-day-label">J</div>
        <div class="dp-day-label">V</div><div class="dp-day-label">S</div>
        <div class="dp-day-label">D</div>
      </div>
      <div class="dp-grid" id="dp-days"></div>
    </div>
    <div class="dp-year-grid" id="dp-year-grid" style="display:none;"></div>
    <div class="dp-error" id="dp-error" style="display:none;"></div>
    <div class="dp-footer">
      <button class="dp-btn dp-btn-cancel" id="dp-cancel" type="button">Cancelar</button>
      <button class="dp-btn dp-btn-ok"     id="dp-ok"     type="button">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal crop -->
<div id="modal-crop" style="display:none;">
  <div class="crop-sheet">
    <div class="crop-handle"></div>
    <p class="crop-title">Ajusta tu foto</p>
    <div class="crop-area">
      <img id="crop-image" style="display:block;max-width:100%;">
    </div>
    <p class="crop-hint">Pellizca para hacer zoom · Arrastra para reencuadrar</p>
    <div class="crop-actions">
      <button onclick="cancelarCrop()" class="crop-btn-cancel">Cancelar</button>
      <button onclick="confirmarCrop()" class="crop-btn-confirm" id="btn-aplicar-crop">
        Usar foto
      </button>
    </div>
  </div>
</div>
