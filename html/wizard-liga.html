<div id="wiz-liga-overlay" class="wiz-equipo-overlay">

  <!-- PANTALLA 0: Login con Google (antes del intro) -->
  <div id="wiz-liga-login-screen" class="wiz-liga-intro-screen" style="display:none;">
    <div class="wiz-intro-bg">
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-1"></span>
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-2"></span>
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-3"></span>
    </div>
    <div class="wiz-intro-content">
      <div class="wiz-intro-logo">👋</div>
      <h1 class="wiz-intro-title">¡Bienvenidx!</h1>
      <p class="wiz-intro-sub">Para crear tu liga necesitamos identificarte. Iniciá sesión con Google.</p>
      <div style="position:relative; margin:24px auto 0; width:fit-content;">
        <div id="wiz-liga-google-btn" class="login-google-btn-wrap wiz-liga-google-wrap"></div>
        <div id="wiz-liga-google-mask" style="position:absolute;inset:0;background:var(--bg);border-radius:4px;transition:opacity 0.4s ease;"></div>
      </div>
      <button id="wiz-liga-btn-volver" class="wiz-btn-secondary" style="opacity:0;transition:opacity 0.4s ease;" onclick="cerrarWizLiga()">Volver</button>
    </div>
  </div>

  <!-- PANTALLA 1: Intro "Crea tu liga" -->
  <div id="wiz-liga-intro" class="wiz-liga-intro-screen" style="display:none;">
    <div class="wiz-intro-bg">
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-1"></span>
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-2"></span>
      <span class="wiz-intro-bg-ring wiz-intro-bg-ring-3"></span>
    </div>
    <div class="wiz-intro-content">
      <div class="wiz-intro-logo">🏟️</div>
      <h1 class="wiz-intro-title">Crea tu liga</h1>
      <p class="wiz-intro-sub">Vamos a configurar tu liga y tu primer equipo. El proceso toma pocos minutos.</p>
      <div class="wiz-intro-steps">
        <div class="wiz-intro-step wiz-intro-step-1">
          <span class="wiz-intro-step-ico">🏟️</span>
          <span class="wiz-intro-step-txt">Tu liga y equipo</span>
        </div>
        <div class="wiz-intro-step wiz-intro-step-2">
          <span class="wiz-intro-step-ico">🎨</span>
          <span class="wiz-intro-step-txt">Personalización</span>
        </div>
        <div class="wiz-intro-step wiz-intro-step-3">
          <span class="wiz-intro-step-ico">👤</span>
          <span class="wiz-intro-step-txt">Perfil</span>
        </div>
      </div>
      <button class="wiz-intro-btn" onclick="wizLigaIntroStart()">
        <span>Comenzar</span>
        <span class="material-icons">arrow_forward</span>
      </button>
      <button class="wiz-btn-secondary" onclick="cerrarWizLiga()">Volver</button>
    </div>
  </div>

  <!-- HEADER LIGA -->
  <div class="wiz-header" id="wiz-liga-header" style="display:none;">
    <button type="button" class="wiz-back-btn" id="wiz-liga-btn-back" onclick="wizLigaPasoAnterior()">
      <span class="material-icons">arrow_back</span>
    </button>
    <div class="wiz-progress-wrap">
      <div class="wiz-progress-bar">
        <div class="wiz-progress-fill" id="wiz-liga-progress-fill"></div>
      </div>
      <span class="wiz-step-label" id="wiz-liga-step-label">Paso 1</span>
    </div>
  </div>

  <!-- CONTENIDO DINÁMICO -->
  <div class="wiz-equipo-contenido" id="wiz-liga-contenido"></div>

  <!-- FOOTER LIGA -->
  <div class="wiz-equipo-footer" id="wiz-liga-footer" style="display:none;"></div>

</div><!-- /wiz-liga-overlay -->
